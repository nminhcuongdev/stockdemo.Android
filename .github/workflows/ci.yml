name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & unit test (devDebug)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # The real google-services.json holds project credentials and is gitignored,
      # but the Google Services plugin refuses to configure without one. A dummy
      # with the correct package_name is enough to compile and run unit tests —
      # no CI job here talks to Firebase. Push/FCM is verified on a real device.
      - name: Generate placeholder google-services.json
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "stockdemo-ci",
              "storage_bucket": "stockdemo-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.example.stockdemo"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "AIzaSyCI00000000000000000000000000000000" }
                ],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDevDebugUnitTest --stacktrace

      - name: Assemble devDebug APK
        run: ./gradlew assembleDevDebug --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDevDebugUnitTest/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: app/build/outputs/apk/dev/debug/*.apk

  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate placeholder google-services.json
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "stockdemo-ci",
              "storage_bucket": "stockdemo-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.example.stockdemo"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "AIzaSyCI00000000000000000000000000000000" }
                ],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Reports lint findings without failing the build; tighten to `lintDevDebug`
      # with abortOnError once the existing warnings are triaged.
      - name: Lint
        run: ./gradlew lintDevDebug --stacktrace
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-devDebug.html
